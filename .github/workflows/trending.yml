name: GitHub Trending 推送企业微信
on:
  schedule:
    - cron: '0 1 * * *'  # 北京时间9:00推送（UTC+8）
  workflow_dispatch:     # 手动触发测试

jobs:
  send-trending:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除Node警告
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: 安装依赖（新增BeautifulSoup用于HTML解析）
        run: pip install requests beautifulsoup4

      - name: 执行推送脚本
        env:
          WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK }}
        run: |
          cat > main.py << 'EOF'
          import requests, os, traceback
          from bs4 import BeautifulSoup

          # ========== 自定义配置（按需修改）==========
          SINCE = "daily"       # daily/weekly/monthly
          LANGUAGE = "typescript"         # 指定语言：python/java/javascript，空=全部
          LIMIT = 10            # 推送条数
          # =========================================

          def get_github_trending():
              """直接爬取GitHub官方Trending页面，不依赖第三方API"""
              # 构造请求URL
              base_url = "https://github.com/trending"
              params = []
              if LANGUAGE:
                  params.append(f"language={LANGUAGE}")
              if SINCE != "daily":
                  params.append(f"since={SINCE}")
              if params:
                  url = f"{base_url}?{'&'.join(params)}"
              else:
                  url = base_url
              
              # 模拟浏览器请求头（关键，避免被GitHub拒绝）
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
                  "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.8"
              }

              try:
                  print(f"正在爬取: {url}")
                  response = requests.get(url, headers=headers, timeout=20)
                  response.raise_for_status()  # 抛出HTTP错误
                  soup = BeautifulSoup(response.text, "html.parser")
                  
                  # 解析页面数据（基于GitHub官方页面结构）
                  repos = []
                  repo_cards = soup.find_all("article", class_="Box-row")
                  print(f"找到 {len(repo_cards)} 个仓库")

                  for card in repo_cards[:LIMIT]:
                      repo = {}
                      
                      # 解析仓库名称和URL
                      h2_tag = card.find("h2", class_="h3 lh-condensed")
                      if h2_tag and h2_tag.find("a"):
                          repo_name = h2_tag.find("a").get("href").lstrip("/")
                          repo["name"] = repo_name
                          repo["url"] = f"https://github.com/{repo_name}"
                          repo["author"] = repo_name.split("/")[0]
                      
                      # 解析描述
                      desc_tag = card.find("p", class_="col-9 color-fg-muted my-1 pr-4")
                      repo["description"] = desc_tag.get_text(strip=True) if desc_tag else "无描述"
                      
                      # 解析编程语言
                      lang_tag = card.find("span", class_="d-inline-block ml-0 mr-3")
                      repo["language"] = lang_tag.get_text(strip=True) if lang_tag else "未知语言"
                      
                      # 解析Stars数
                      star_tag = card.find("a", class_="Link--muted d-inline-block mr-3")
                      if star_tag:
                          star_text = star_tag.get_text(strip=True).replace(",", "")
                          repo["stars"] = int(star_text) if star_text.isdigit() else 0
                      else:
                          repo["stars"] = 0
                      
                      repos.append(repo)
                  
                  return repos if repos else None

              except Exception as e:
                  print(f"爬取失败: {str(e)}")
                  traceback.print_exc()
                  return None

          def build_wecom_message(data):
              """构造企业微信Markdown格式消息"""
              if not data:
                  return "❌ 今日 GitHub Trending 数据获取失败\n请查看GitHub Actions日志排查问题"
              
              # 构建标题
              title = f"# 🔥 GitHub {'每日' if SINCE == 'daily' else '每周' if SINCE == 'weekly' else '每月'}热门仓库"
              if LANGUAGE:
                  title += f"（{LANGUAGE}）"
              
              content = [title, ""]
              
              # 构建仓库列表
              for idx, repo in enumerate(data, 1):
                  content.append(
                      f"{idx}. **[{repo['name']}]({repo['url']})**\n"
                      f"   👤 {repo['author']} | 🔤 {repo['language']} | ⭐ {repo['stars']}\n"
                      f"   📝 {repo['description']}\n"
                  )
              
              return "\n".join(content)

          def send_to_wecom():
              """发送消息到企业微信群聊"""
              webhook_url = os.getenv("WEBHOOK_URL")
              if not webhook_url:
                  print("错误：未配置企业微信Webhook地址（WECOM_WEBHOOK）")
                  return

              # 获取Trending数据
              trending_data = get_github_trending()
              message = build_wecom_message(trending_data)

              # 发送到企业微信
              headers = {"Content-Type": "application/json"}
              payload = {
                  "msgtype": "markdown",
                  "markdown": {"content": message}
              }

              try:
                  response = requests.post(
                      webhook_url,
                      headers=headers,
                      json=payload,
                      timeout=15
                  )
                  print(f"推送结果: {response.status_code} | {response.text}")
                  result = response.json()
                  if result.get("errcode") == 0:
                      print("✅ 消息推送成功")
                  else:
                      print(f"❌ 推送失败: {result.get('errmsg')}")
              except Exception as e:
                  print(f"推送过程异常: {e}")
                  traceback.print_exc()

          if __name__ == "__main__":
              send_to_wecom()
          EOF
          python main.py
